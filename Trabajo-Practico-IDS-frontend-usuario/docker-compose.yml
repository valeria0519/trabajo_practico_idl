# Docker Compose moderno ya no necesita la clave "version": la ignora y
# tira un warning si esta presente, asi que la omitimos.

services:
  # --- BASE DE DATOS ---
  db:
    image: postgres:15-alpine
    container_name: fiuba_db
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      # Volumen persistente: los datos sobreviven aunque se borre el contenedor.
      - postgres_data:/var/lib/postgresql/data
      # Se ejecuta UNA sola vez, cuando el volumen de arriba se crea vacio.
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- BACKEND (Node/Express) ---
  backend:
    build: ./backend
    container_name: fiuba_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      # "db" es el nombre del servicio de arriba, no localhost: dentro de la
      # red interna de Docker, Compose resuelve ese nombre a la IP del
      # contenedor de PostgreSQL.
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      # Usamos el propio Node del contenedor para golpear /api/health:
      # la imagen node:18-alpine no trae curl/wget instalados.
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8000/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # --- FRONTEND (Nginx sirviendo archivos estaticos) ---
  frontend:
    build: ./frontend
    container_name: fiuba_frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
