<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudyRoom FIUBA</title>

  <!--
    index.html es el archivo que Nginx abre por defecto cuando se entra a la
    aplicacion. Lo dejamos como redireccion minima para que la primera pantalla
    visible sea login.html, donde esta encapsulado el Login completo.
  -->
  <meta http-equiv="refresh" content="0; url=login.html">
</head>
<body>
  <!--
    Este enlace funciona como respaldo si algun navegador no ejecuta la
    redireccion automatica por meta refresh.
  -->
  <a href="login.html">Ir al Login</a>
</body>
</html>
